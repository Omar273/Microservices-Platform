# =============================================================================
#  GRAFANA POD — Standalone
#  Separate from task-service-pod and user-service-pod
#
#  Connects to Prometheus running inside task-service-pod
#  via the Kubernetes service: task-service-svc:9090
#
#  Access: http://localhost:30300  
# =============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: grafana-pod
  namespace: task-manager
  labels:
    app: grafana
spec:
  containers:
    - name: grafana
      image: grafana/grafana:10.4.0
      ports:
        - containerPort: 30300
      env: 
        - name: GF_SERVER_HTTP_PORT
          value: "30300"   
        - name: GF_SECURITY_ADMIN_USER
          value: "admin"
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        - name: GF_PATHS_PROVISIONING
          value: "/etc/grafana/provisioning"
      volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: grafana-dashboards-provider
          mountPath: /etc/grafana/provisioning/dashboards
        - name: grafana-dashboards-json
          mountPath: /var/lib/grafana/dashboards     
      readinessProbe:
        httpGet:
          path: /api/health
          port: 30300
        initialDelaySeconds: 15
        periodSeconds: 5
        failureThreshold: 5
      livenessProbe:
        httpGet:
          path: /api/health
          port: 30300
        initialDelaySeconds: 30
        periodSeconds: 10
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
          cpu: "300m"

  volumes:
    - name: grafana-storage
      persistentVolumeClaim:
        claimName: grafana-pvc
    - name: grafana-datasources
      configMap:
        name: grafana-datasources
    - name: grafana-dashboards-provider
      configMap:
        name: grafana-dashboards-provider
    - name: grafana-dashboards-json
      configMap:
        name: grafana-dashboards-json

  restartPolicy: Always

---
# =============================================================================
#  PVC — persists Grafana data across pod restarts
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: task-manager
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# =============================================================================
#  DATASOURCE — auto-connects Grafana to Prometheus on startup
#  Points to task-service-svc:9090 (the Prometheus inside task-service-pod)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: task-manager
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://task-service-svc:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: "15s"

---
# =============================================================================
#  DASHBOARD PROVIDER — tells Grafana to load JSON files from the folder below
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: task-manager
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: task-manager
        orgId: 1
        folder: "Task Manager Platform"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

---
# =============================================================================
#  DASHBOARDS — 3 pre-built dashboards loaded automatically
#    1. FastAPI   → requests, latency, error rate
#    2. PostgreSQL → connections, transactions, cache hit rate
#    3. Redis      → memory, hit/miss rate, commands/sec
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-json
  namespace: task-manager
data:

  # ── Dashboard 1: FastAPI ────────────────────────────────────────────────────
  fastapi.json: |
    {
      "uid": "fastapi",
      "title": "FastAPI — Task Service",
      "tags": ["fastapi"],
      "timezone": "browser",
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1, "title": "Requests / Second",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 8 },
          "targets": [{
            "expr": "sum(rate(http_requests_total[1m])) by (method, handler)",
            "legendFormat": "{{method}} {{handler}}"
          }],
          "fieldConfig": { "defaults": { "unit": "reqps" }}
        },
        {
          "id": 2, "title": "Error Rate (4xx + 5xx)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(rate(http_requests_total{status=~\"4..|5..\"}[5m])) by (status)",
            "legendFormat": "HTTP {{status}}"
          }],
          "fieldConfig": { "defaults": { "unit": "reqps", "color": { "fixedColor": "red", "mode": "fixed" }}}
        },
        {
          "id": 3, "title": "Latency p50 / p95 / p99",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            { "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p50" },
            { "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p95" },
            { "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p99" }
          ],
          "fieldConfig": { "defaults": { "unit": "s" }}
        },
        {
          "id": 4, "title": "Total Requests (1h)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 16, "w": 8, "h": 4 },
          "targets": [{ "expr": "sum(increase(http_requests_total[1h]))", "legendFormat": "Total" }],
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" },
            "thresholds": { "steps": [
              { "color": "green", "value": null },
              { "color": "yellow", "value": 1000 },
              { "color": "red", "value": 5000 }
            ]}}}
        },
        {
          "id": 5, "title": "Active Requests",
          "type": "stat",
          "gridPos": { "x": 8, "y": 16, "w": 8, "h": 4 },
          "targets": [{ "expr": "sum(http_requests_in_progress)", "legendFormat": "In Progress" }],
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" },
            "thresholds": { "steps": [
              { "color": "green", "value": null },
              { "color": "orange", "value": 10 },
              { "color": "red", "value": 50 }
            ]}}}
        },
        {
          "id": 6, "title": "Avg Response Time",
          "type": "stat",
          "gridPos": { "x": 16, "y": 16, "w": 8, "h": 4 },
          "targets": [{ "expr": "sum(rate(http_request_duration_seconds_sum[5m])) / sum(rate(http_request_duration_seconds_count[5m]))", "legendFormat": "Avg" }],
          "fieldConfig": { "defaults": { "unit": "s", "color": { "mode": "thresholds" },
            "thresholds": { "steps": [
              { "color": "green", "value": null },
              { "color": "yellow", "value": 0.5 },
              { "color": "red", "value": 1 }
            ]}}}
        }
      ]
    }

  # ── Dashboard 2: PostgreSQL ─────────────────────────────────────────────────
  postgres.json: |
    {
      "uid": "postgres",
      "title": "PostgreSQL — Task DB",
      "tags": ["postgres"],
      "timezone": "browser",
      "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1, "title": "Active Connections",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [{ "expr": "pg_stat_activity_count{datname=\"taskdb\"}", "legendFormat": "Connections" }],
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" },
            "thresholds": { "steps": [
              { "color": "green", "value": null },
              { "color": "yellow", "value": 50 },
              { "color": "red", "value": 100 }
            ]}}}
        },
        {
          "id": 2, "title": "Commits / Rollbacks per Second",
          "type": "timeseries",
          "gridPos": { "x": 6, "y": 0, "w": 18, "h": 8 },
          "targets": [
            { "expr": "rate(pg_stat_database_xact_commit{datname=\"taskdb\"}[1m])", "legendFormat": "Commits/s" },
            { "expr": "rate(pg_stat_database_xact_rollback{datname=\"taskdb\"}[1m])", "legendFormat": "Rollbacks/s" }
          ],
          "fieldConfig": { "defaults": { "unit": "ops" }}
        },
        {
          "id": 3, "title": "Cache Hit Rate",
          "type": "gauge",
          "gridPos": { "x": 0, "y": 4, "w": 6, "h": 4 },
          "targets": [{
            "expr": "pg_stat_database_blks_hit{datname=\"taskdb\"} / (pg_stat_database_blks_hit{datname=\"taskdb\"} + pg_stat_database_blks_read{datname=\"taskdb\"}) * 100",
            "legendFormat": "Cache Hit %"
          }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100,
            "color": { "mode": "thresholds" },
            "thresholds": { "steps": [
              { "color": "red", "value": null },
              { "color": "yellow", "value": 80 },
              { "color": "green", "value": 95 }
            ]}}}
        },
        {
          "id": 4, "title": "Rows Inserted / Updated / Deleted",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 8 },
          "targets": [
            { "expr": "rate(pg_stat_database_tup_inserted{datname=\"taskdb\"}[1m])", "legendFormat": "Inserts/s" },
            { "expr": "rate(pg_stat_database_tup_updated{datname=\"taskdb\"}[1m])", "legendFormat": "Updates/s" },
            { "expr": "rate(pg_stat_database_tup_deleted{datname=\"taskdb\"}[1m])", "legendFormat": "Deletes/s" }
          ],
          "fieldConfig": { "defaults": { "unit": "ops" }}
        },
        {
          "id": 5, "title": "Database Size",
          "type": "stat",
          "gridPos": { "x": 0, "y": 16, "w": 8, "h": 4 },
          "targets": [{ "expr": "pg_database_size_bytes{datname=\"taskdb\"}", "legendFormat": "Size" }],
          "fieldConfig": { "defaults": { "unit": "bytes" }}
        },
        {
          "id": 6, "title": "Deadlocks",
          "type": "timeseries",
          "gridPos": { "x": 8, "y": 16, "w": 16, "h": 4 },
          "targets": [{ "expr": "rate(pg_stat_database_deadlocks{datname=\"taskdb\"}[5m])", "legendFormat": "Deadlocks/s" }],
          "fieldConfig": { "defaults": { "unit": "ops", "color": { "fixedColor": "red", "mode": "fixed" }}}
        }
      ]
    }

  # ── Dashboard 3: Redis ──────────────────────────────────────────────────────
  redis.json: |
    {
      "uid": "redis",
      "title": "Redis — Task Cache",
      "tags": ["redis"],
      "timezone": "browser",
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1, "title": "Memory Used",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [{ "expr": "redis_memory_used_bytes", "legendFormat": "Memory" }],
          "fieldConfig": { "defaults": { "unit": "bytes", "color": { "mode": "thresholds" },
            "thresholds": { "steps": [
              { "color": "green", "value": null },
              { "color": "yellow", "value": 100000000 },
              { "color": "red", "value": 200000000 }
            ]}}}
        },
        {
          "id": 2, "title": "Commands / Second",
          "type": "timeseries",
          "gridPos": { "x": 6, "y": 0, "w": 18, "h": 8 },
          "targets": [{ "expr": "rate(redis_commands_processed_total[1m])", "legendFormat": "Commands/s" }],
          "fieldConfig": { "defaults": { "unit": "ops" }}
        },
        {
          "id": 3, "title": "Cache Hit Rate",
          "type": "gauge",
          "gridPos": { "x": 0, "y": 4, "w": 6, "h": 4 },
          "targets": [{
            "expr": "rate(redis_keyspace_hits_total[5m]) / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m])) * 100",
            "legendFormat": "Hit Rate %"
          }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100,
            "color": { "mode": "thresholds" },
            "thresholds": { "steps": [
              { "color": "red", "value": null },
              { "color": "yellow", "value": 70 },
              { "color": "green", "value": 90 }
            ]}}}
        },
        {
          "id": 4, "title": "Hits vs Misses",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            { "expr": "rate(redis_keyspace_hits_total[1m])", "legendFormat": "Hits/s" },
            { "expr": "rate(redis_keyspace_misses_total[1m])", "legendFormat": "Misses/s" }
          ],
          "fieldConfig": { "defaults": { "unit": "ops" }}
        },
        {
          "id": 5, "title": "Connected Clients",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [{ "expr": "redis_connected_clients", "legendFormat": "Clients" }],
          "fieldConfig": { "defaults": { "unit": "short" }}
        },
        {
          "id": 6, "title": "Total Keys",
          "type": "stat",
          "gridPos": { "x": 0, "y": 16, "w": 8, "h": 4 },
          "targets": [{ "expr": "sum(redis_db_keys)", "legendFormat": "Keys" }],
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" },
            "thresholds": { "steps": [{ "color": "blue", "value": null }]}}}
        },
        {
          "id": 7, "title": "Expired Keys / Second",
          "type": "timeseries",
          "gridPos": { "x": 8, "y": 16, "w": 16, "h": 4 },
          "targets": [{ "expr": "rate(redis_expired_keys_total[1m])", "legendFormat": "Expired/s" }],
          "fieldConfig": { "defaults": { "unit": "ops" }}
        }
      ]
    }

---
# =============================================================================
#  SERVICES
# =============================================================================

# ClusterIP — other pods can reach Grafana internally
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
  namespace: task-manager
spec:
  selector:
    app: grafana
  ports:
    - port: 30300
      targetPort: 30300
  type: ClusterIP

---
# NodePort — open http://localhost:30300 in your browser
apiVersion: v1
kind: Service
metadata:
  name: grafana-nodeport
  namespace: task-manager
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
  type: NodePort